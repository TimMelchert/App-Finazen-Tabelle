<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz-Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 0.9em; }
        .stat { background: #eef2f3; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #dce4e6; }
        .stat b { display: block; color: #2c3e50; font-size: 0.75em; text-transform: uppercase; }
        .stat span { font-size: 1.1em; font-weight: bold; color: #1a73e8; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-ausgabe { background: #e74c3c; }
        .status { text-align: center; color: #7f8c8d; font-size: 14px; min-height: 24px; margin-top: 10px; }
        label { font-size: 0.85em; color: #7f8c8d; margin-left: 5px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h3>💰 Kontostände</h3>
    <div class="grid">
        <div class="stat"><b>Gesamt</b><span id="val-gesamt">-</span> €</div>
        <div class="stat"><b>Konto</b><span id="val-konto">-</span> €</div>
        <div class="stat"><b>PayPal</b><span id="val-paypal">-</span> €</div>
        <div class="stat"><b>Wallet</b><span id="val-portemonnaie">-</span> €</div>
    </div>

    <hr>

    <label for="reiter">Ziel-Tabellenblatt:</label>
    <select id="reiter">
        <option value="Konto">Konto</option>
        <option value="Paypal">Paypal</option>
        <option value="Kreditkarte">Kreditkarte</option>
        <option value="Portemonnaie">Portemonnaie</option>
        <option value="Münzglas">Münzglas</option>
    </select>

    <label for="datum">Datum (leer lassen für heute):</label>
    <input type="date" id="datum">

    <input type="number" id="betrag" placeholder="Betrag (€)" step="0.01" inputmode="decimal">
