<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz-Manager Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #27ae60; --danger: #e74c3c; --dark: #34495e; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); max-width: 450px; margin: auto; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat { background: #f8fafb; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #edf2f4; }
        .stat b { display: block; color: #7f8c8d; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat span { font-size: 1.15em; font-weight: bold; color: var(--primary); }
        
        label { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 4px 5px; display: block; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #dce4e6; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-ein { background: var(--primary); }
        .btn-aus { background: var(--danger); }
        
        .umbuchung-box { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px dashed #cbd5e0; margin-top: 25px; }
        .btn-umbuchung { background: var(--dark); margin-top: 10px; width: 100%; }
        
        .status { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 15px; min-height: 18px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; font-size: 1.4em;">Kontostände</h2>
        <button onclick="loadStats()" style="width: auto; padding: 6px 12px; background: #eee; color: #666; font-size: 12px;">🔄 Laden</button>
    </div>
    
    <div class="grid" style="margin-top: 15px;">
        <div class="stat"><b>Gesamt</b><span id="val-gesamt">...</span> €</div>
        <div class="stat"><b>Konto</b><span id="val-konto">...</span> €</div>
        <div class="stat"><b>PayPal</b><span id="val-paypal">...</span> €</div>
        <div class="stat"><b>Wallet</b><span id="val-portemonnaie">...</span> €</div>
    </div>

    <hr>

    <label>Konto / Ziel:</label>
    <select id="reiter">
        <option value="Konto">Konto (EC)</option>
        <option value="Paypal">Paypal</option>
        <option value="Kreditkarte">Kreditkarte</option>
        <option value="Portemonnaie">Portemonnaie (Bar)</option>
        <option value="Münzglas">Münzglas</option>
        <option value="Pfandbon">Pfandbon (Münzglas G-K)</option>
    </select>

    <label>Datum (optional):</label>
    <input type="date" id="datum">

    <label>Beschreibung (Zweck):</label>
    <input type="text" id="zweck" placeholder="z.B. Wocheneinkauf Rewe">

    <label>Kategorie (#Hashtag):</label>
    <input list="kat-liste" id="kategorie" placeholder="Kategorie wählen oder tippen...">
