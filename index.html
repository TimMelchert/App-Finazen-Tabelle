<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz-Manager</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        .gesamt-container { text-align: center; padding: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee; }
        .gesamt-label { font-size: 0.9em; color: #666; font-weight: bold; text-transform: uppercase; }
        .gesamt-wert { font-size: 2.2em; font-weight: bold; color: #27ae60; display: block; margin-top: 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat b { display: block; font-size: 0.75em; color: #666; margin-bottom: 3px; }
        .stat span { font-weight: bold; color: #333; font-size: 1.1em; }
        
        label { display: block; margin: 10px 0 3px 0; font-size: 0.8em; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; margin-bottom: 5px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-ein { background: #27ae60; }
        .btn-aus { background: #e74c3c; }
        
        .umbuchung-box { background: #f0f0f0; padding: 15px; border-radius: 10px; border: 1px dashed #999; margin-top: 20px; }
        .btn-umb { background: #34495e; width: 100%; margin-top: 10px; }
        .status { text-align: center; color: #7f8c8d; font-size: 13px; margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

<div id="success-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
    <span style="font-size: 100px;">✅</span>
    <h2 style="color:#27ae60; font-family:sans-serif;">Gesendet!</h2>
</div>
    
<div class="card">
    <div class="gesamt-container">
        <span class="gesamt-label">Gesamtvermögen</span>
        <span id="val-gesamt" class="gesamt-wert">... €</span>
    </div>

    <div class="grid">
        <div class="stat"><b>Konto</b><span id="val-konto">...</span>€</div>
        <div class="stat"><b>PayPal</b><span id="val-paypal">...</span>€</div>
        <div class="stat"><b>Portemonnaie</b><span id="val-portemonnaie">...</span>€</div>
        <div class="stat"><b>Münzglas</b><span id="val-muenzglas">...</span>€</div>
    </div>

    <hr>

    <label>Konto / Quelle:</label>
    <select id="reiter">
        <option value="Konto">Konto (EC)</option>
        <option value="Paypal">Paypal</option>
        <option value="Kreditkarte">Kreditkarte</option>
        <option value="Portemonnaie">Portemonnaie (Bar)</option>
        <option value="Muenzglas">Münzglas</option>
        <option value="Pfandbons">Pfandbons</option>
        <option value="Wertmarken">Wertmarken</option>
    </select>

    <label>Datum:</label>
    <input type="date" id="datum">

    <label>Zweck (Beschreibung):</label>
    <input type="text" id="zweck" placeholder="z.B. Rewe Einkauf">

    <label>Hashtag (Kategorie):</label>
    <input list="kat-liste" id="kategorie" placeholder="Wählen oder Tippen">
    <datalist id="kat-liste">
        <option value="Abos">
        <option value="Aktivismus">
        <option value="Essen">
        <option value="Fortbewegung">
        <option value="Freizeit">
        <option value="Geschenke">
        <option value="Hygiene">
        <option value="Spenden">
        <option value="Studium">
        <option value="Style">
        <option value="Technik">
        <option value="Urlaub">
        <option value="Wohnen">
        <option value="Freizeit">
        <option value="Job">
        <option value="Staat">
        <option value="Trinkgeld">
        <option value="Bank">
        <option value="Zuhause">
        <option value="Großeltern">
    </select>
    </datalist>

    <label>Betrag (€):</label>
    <input type="number" id="betrag" placeholder="0.00" step="0.01" inputmode="decimal">

    <div class="btn-group">
        <button onclick="senden('aus')" class="btn-aus">Ausgabe (-)</button>
        <button onclick="senden('ein')" class="btn-ein">Einnahme (+)</button>
    </div>

    <div class="umbuchung-box">
        <label>Transfer NACH:</label>
        <select id="ziel_reiter">
            <option value="Portemonnaie">Portemonnaie (Bar)</option>
            <option value="Konto">Konto (EC)</option>
            <option value="Paypal">Paypal</option>
            <option value="Muenzglas">Münzglas</option>
            <option value="Pfandbons">Pfandbons</option>
            <option value="Wertmarken">Wertmarken</option>
        </select>
        <button onclick="senden('umbuchung')" class="btn-umb">Umbuchung bestätigen ⇄</button>
    </div>

    <p id="status" class="status"></p>
    <button onclick="loadStats()" style="background:none; color:#999; width:100%; border:none; font-size:11px; margin-top:10px;">🔄 Daten aktualisieren</button>
</div>

<script>
   const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbw4ak89SrPWn9uWLhhGDkieud8N_cGO7xeoTvDxwn7_fPTHSD6THuxaeInnfLTdf75arw/exec";
    
    let userPin = localStorage.getItem('finanz_pin') || prompt("Sicherheits-PIN:");
    if (userPin) localStorage.setItem('finanz_pin', userPin);

    window.onload = () => {
        document.getElementById('datum').valueAsDate = new Date();
        loadStats();
    };

    async function loadStats() {
        try {
            const r = await fetch(GOOGLE_URL);
            const s = await r.json();
            document.getElementById('val-gesamt').innerText = s.gesamt.toFixed(2) + " €";
            document.getElementById('val-konto').innerText = s.konto.toFixed(2);
            document.getElementById('val-paypal').innerText = s.paypal.toFixed(2);
            document.getElementById('val-portemonnaie').innerText = s.portemonnaie.toFixed(2);
            document.getElementById('val-muenzglas').innerText = s.muenzglas.toFixed(2);
            
            // Farbe für Gesamtbetrag
            document.getElementById('val-gesamt').style.color = s.gesamt >= 0 ? "#27ae60" : "#e74c3c";
        } catch(e) { console.log("Fehler beim Laden"); }
    }

   async function senden(typ) {
        const statusEl = document.getElementById('status');
        const overlay = document.getElementById('success-overlay');
        
        const data = {
            pin: userPin,
            reiter: document.getElementById('reiter').value,
            ziel: document.getElementById('ziel_reiter').value,
            betrag: parseFloat(document.getElementById('betrag').value.replace(',', '.')),
            zweck: document.getElementById('zweck').value || "Transfer",
            kategorie: document.getElementById('kategorie').value || "Allgemein",
            datum: document.getElementById('datum').value,
            mode: typ
        };

        if (isNaN(data.betrag)) return alert("Betrag eingeben!");

        statusEl.innerText = "Sende...";
        
        try {
            // POST an Google
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            // 1. Großes Overlay anzeigen
            overlay.style.display = 'flex';
            
            // 2. Felder zurücksetzen
            document.getElementById('betrag').value = "";
            document.getElementById('zweck').value = "";
            document.getElementById('kategorie').value = "";
            statusEl.innerText = "";

            // 3. Nach 1,5 Sekunden: Overlay weg und Stats neu laden
            setTimeout(() => {
                overlay.style.display = 'none';
                loadStats();
            }, 1500);

        } catch(e) { 
            statusEl.innerText = "❌ Fehler!";
            console.error(e);
        }
    }
</script>

</body>
</html>
